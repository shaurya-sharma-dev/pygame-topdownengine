name: CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'topdownengine/**'
      - 'tests/**'
      - 'pyproject.toml'
      
  pull_request:
    branches: [ "main" ]
    paths:
      - 'topdownengine/**'
      - 'tests/**'
      - 'pyproject.toml'

permissions:
  contents: write

jobs:
  run-tests:
    name: Run tests on ${{ matrix.os }} with Python ${{ matrix.python }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.12.10", "3.13", "3.14"]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: "pip"

      - name: Install package and dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"

      - name: Execute tests
        run: |
          python -m pytest --cov --cov-report=html

    # We upload the coverage artifact from just one platform to prevent unneeded overwrites.
    # The actual platform used does not matter, so we are just using ubuntu since is it the
    # fastest OS to run the tests on.
      - name: Upload coverage artifact
        if: matrix.os == "ubuntu-latest" && matrix.python == "3.13"
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-report
          path: htmlcov/
          retention-days: 1

  deploy-coverage:
    name: Deploy Coverage to Pages
    needs: run-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0
          
      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-html-report
          path: htmlcov

      - name: Configure Git Credentials
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add coverage to gh-pages and push
        run: |
          mkdir -p coverage
          rm -rf coverage/*
          cp -r htmlcov/* coverage/
          
          git add coverage/
          
          if ! git diff --cached --quiet; then
            git commit -m "automation: update public coverage report [skip ci]"
            git push origin gh-pages
          else
            echo "No coverage changes detected. Skipping commit."
          fi