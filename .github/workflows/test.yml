name: Tests

on:
  push:
    branches: [ "main" ]
    paths:
      - '**'                  # Include entire repository
      - '!docs/**'            # Exclude docs/
      - '!.github/**'         # Exclude .github/
      - '.github/workflows/test.yml' # Include this workflow file
      - '!**/LICENSE' # Exclude LICENSE
      - '!**/README.md' # Exclude README
      - '!**/CHANGELOG.md' # Exclude CHANGELOG
      - '!**/CONTRIBUTING.md' # Exclude CONTRIBUTING.md
      - '!**/CODE_OF_CONDUCT.md' # Exclude CODE OF CONDUCT
      - '!**/.gitignore' # Exclude .gitignore
      - '!**/zensical.toml' # Exclude zensical.toml
      - '!**/docs-versions.json' # Exclude docs-versions.json
      
  pull_request:
    branches: [ "main" ]
    paths:
      - '**'                  # Include entire repository
      - '!docs/**'            # Exclude docs/
      - '!.github/**'         # Exclude .github/
      - '.github/workflows/test.yml' # Include this workflow file
      - '!**/LICENSE' # Exclude LICENSE
      - '!**/README.md' # Exclude README
      - '!**/CHANGELOG.md' # Exclude CHANGELOG
      - '!**/CONTRIBUTING.md' # Exclude CONTRIBUTING.md
      - '!**/CODE_OF_CONDUCT.md' # Exclude CODE OF CONDUCT
      - '!**/.gitignore' # Exclude .gitignore
      - '!**/zensical.toml' # Exclude zensical.toml
      - '!**/docs-versions.json' # Exclude docs-versions.json

jobs:
  run-tests:
    name: Test on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.10"
          cache: "pip"

      - name: Install package and dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"

      - name: Execute tests
        run: |
          python -m pytest