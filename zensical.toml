[project]
site_name = "pygame-topdownengine Documentation"
site_url = "https://shaurya-sharma-dev.github.io/pygame-topdownengine/"
repo_url = "https://github.com/shaurya-sharma-dev/pygame-topdownengine/" 
repo_name = "pygame-topdownengine"

nav = [
  { "Home" = "index.md" },
  { "Installation" = "installation.md" },
  { "Quickstart" = "quickstart.md" },
  { "API Reference" = [
    { "topdownengine.asset_paths" = "api\\asset_paths" },
    { "topdownengine.camera" = "api\\camera" },
    { "topdownengine.controls" = "api\\controls" },
    { "topdownengine.env_object" = "api\\env_object" },
    { "topdownengine.font" = "api\\font" },
    { "topdownengine.game_object" = "api\\game_object" },
    { "topdownengine.game" = "api\\game" },
    { "topdownengine.math" = "api\\math" },
    { "topdownengine.mobile_object" = "api\\mobile_object" },
    { "topdownengine.scenes" = "api\\scenes" },
    { "topdownengine.ui" = "api\\ui" },
    { "topdownengine.visual_utils" = "api\\visual_utils" }
  ]}
]

[theme]
variant = "modern"

[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"

[features]
navigation_tabs = true
navigation_sections = true
navigation_instant = true

[[plugins]]
name = "search"

[[plugins]]
name = "autorefs"

[[plugins]]
name = "mkdocstrings"

[plugins.config.handlers.python]
paths = ["topdownengine"]
options = { docstring_style = "google", show_source = true }