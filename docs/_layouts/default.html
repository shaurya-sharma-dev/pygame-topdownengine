<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <style>
    ul {
      padding-left: 40px;
    }
  </style>
</head>
<body>
  <div class="wrapper" style="max-width: 1000px; margin: 40px auto; padding: 0 20px; overflow: hidden;">
    
    <!-- Sidebar -->
    <nav class="sidebar-nav" style="border-right: 1px solid #e0e0e0; padding-right: 20px; float: left; width: 230px; margin-right: 40px;">
      <h3 style="margin-top: 0; color: #333;">{{ site.title }}</h3>
      
      {% assign nav_file = site.pages | where: "name", "navigation.md" | first %}
      <div style="line-height: 1.8; font-size: 0.95em;">
        {{ nav_file.content | markdownify }}
      </div>
    </nav>
    
    <!-- Main Content -->
    <main class="main-content" style="overflow: hidden;">
      {{ content | markdownify }}
    </main>

  </div>
</body>
</html>
